config:
  APP_NAME: "Forgejo: Beyond coding. We forge."
  RUN_MODE: dev
  ALLOWED_HOST_LIST: "127.0.0.1"
  nodeIP: 127.0.0.1

customConfig:
  []
  # - name: test
  #   keys:
  #     - name: testkey
  #       value: testvalue

# Enabled postgres
cnpg:
  main:
    enabled: true
    user: gitea
    database: gitea

# --  memcached dependency settings
memcached:
  enabled: true

portal:
  open:
    enabled: true

securityContext:
  container:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

workload:
  main:
    podSpec:
      initContainers:
        1-init-directories:
          enabled: true
          # imageSelector: image
          # type: init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - "/usr/sbin/init_directory_structure.sh"
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          envFrom:
            - configMapRef:
                name: gitea-env
          volumeMounts:
            - name: init
              mountPath: "/usr/sbin"
            - name: temp
              mountPath: "/tmp"
            - name: config
              mountPath: "/etc/gitea/conf"
            - name: data
              mountPath: "/data"
        2-configure-gitea:
          enabled: true
          # imageSelector: image
          # type: init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - "/usr/sbin/configure_gitea.sh"
          envFrom:
            - configMapRef:
                name: gitea-env
          volumeMounts:
            - name: init
              mountPath: "/usr/sbin"
            - name: temp
              mountPath: "/tmp"
            - name: data
              mountPath: "/data"
      containers:
        main:
          probes:
            liveness:
              type: http
              path: /api/healthz
              port: "{{ .Values.service.main.ports.main.port }}"
            readiness:
              type: http
              path: /api/healthz
              port: "{{ .Values.service.main.ports.main.port }}"
            startup:
              type: tcp
            # liveness:
            #   path: "/api/ping"
            #   port: "{{ .Values.service.main.ports.main.port }}"
            #   httpHeaders:
            #     Host: '{{ tpl .Values.workload.main.podSpec.containers.main.env.APP_BASE_URL $ | replace "https://" "" | replace "http://" "" }}'
            # readiness:
            #   path: "/api/ping"
            #   port: "{{ .Values.service.main.ports.main.port }}"
            #   httpHeaders:
            #     Host: '{{ tpl .Values.workload.main.podSpec.containers.main.env.APP_BASE_URL $ | replace "https://" "" | replace "http://" "" }}'
            # startup:
            #   type: tcp
            #   port: "{{ .Values.service.main.ports.main.port }}"
          envFrom:
            - configMapRef:
                name: gitea-env
