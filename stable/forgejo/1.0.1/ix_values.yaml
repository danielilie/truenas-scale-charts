image:
  repository: codeberg.org/forgejo/forgejo
  tag: 1.21.2-1-rootless@sha256:05996cda03897755b5d9b55d1422160f40b720eb789f1fcf305cb4a8515caba8
  pullPolicy: IfNotPresent

service:
  main:
    ports:
      main:
        port: 10037
        targetPort: 3000
  ssh:
    enabled: true
    ports:
      ssh:
        enabled: true
        port: 2222
        targetPort: 2222

persistence:
  data:
    enabled: true
    mountPath: "/data"
  temp:
    enabled: true
    mountPath: "/tmp"
    type: emptyDir
  varlib:
    enabled: true
    mountPath: "/var/lib/gitea"
    type: emptyDir

# Configure commit/action signing prerequisites
signing:
  enabled: true
  gpgHome: /data/git/.gnupg

admin:
  username: giteaadmin
  password: r8sA8CPHD9!bt6d
  email: "gitea@local.domain"

metrics:
  enabled: false
  serviceMonitor:
    enabled: false
    #  additionalLabels:
    #    prometheus-release: prom1# main:
  #   enabled: true
  #   type: "servicemonitor"
  #   endpoints:
  #     - port: main
  #       path: /metrics

ldap:
  enabled: false
  # name:
  # securityProtocol:
  # host:
  # port:
  # userSearchBase:
  # userFilter:
  # adminFilter:
  # emailAttribute:
  # bindDn:
  # bindPassword:
  # usernameAttribute:
  # sshPublicKeyAttribute:

oauth:
  enabled: false
  # name:
